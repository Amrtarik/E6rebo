<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostBoard — User Posts Dashboard</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card-bg:   #1b1f2b;
      --border:    #252a38;
      --accent:    #f0c040;
      --accent2:   #3d8bff;
      --text:      #e8eaf0;
      --muted:     #6b7385;
      --danger:    #ff5c5c;
      --radius:    14px;
      --nav-h:     64px;
    }

    /* ── Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      /* subtle dot grid background */
      background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Navbar ────────────────────────────────────────────────── */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(13, 15, 20, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 1.5rem;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
      color: var(--text);
      white-space: nowrap;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Controls ──────────────────────────────────────────────── */
    .ctrl-select,
    .ctrl-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    .ctrl-select { min-width: 200px; cursor: pointer; }
    .ctrl-input  { min-width: 220px; }

    .ctrl-select:focus,
    .ctrl-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(61,139,255,.18);
    }

    .ctrl-select option { background: var(--surface); }

    /* placeholder color */
    .ctrl-input::placeholder { color: var(--muted); }

    /* Reload button */
    .btn-reload {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color .18s, color .18s, transform .15s;
      white-space: nowrap;
    }

    .btn-reload:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-reload:active { transform: scale(0.96); }

    .btn-reload svg {
      width: 14px; height: 14px;
      transition: transform .4s ease;
    }

    .btn-reload:hover svg { transform: rotate(180deg); }

    /* push reload to right */
    .nav-spacer { flex: 1; }

    /* ── Main Content ──────────────────────────────────────────── */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Section Header ────────────────────────────────────────── */
    .section-header {
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    #section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      color: var(--text);
      line-height: 1.15;
    }

    #post-count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── Loading Spinner ───────────────────────────────────────── */
    #loading-state {
      display: none;          /* shown via JS: loading-state--visible */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 5rem 0;
      color: var(--muted);
      font-size: 0.875rem;
    }

    #loading-state.loading-state--visible { display: flex; }

    .spinner-ring {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert ─────────────────────────────────────────────────── */
    #alert-box {
      display: none;           /* shown via JS */
      align-items: flex-start;
      gap: 0.85rem;
      background: rgba(255, 92, 92, 0.08);
      border: 1px solid rgba(255, 92, 92, 0.35);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      color: #ffaaaa;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    #alert-box.alert-box--visible { display: flex; }

    .alert-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    .alert-body { flex: 1; }
    .alert-title { font-weight: 500; margin-bottom: 2px; }
    .alert-message { color: var(--muted); }

    .alert-retry-btn {
      background: rgba(255,92,92,.15);
      border: 1px solid rgba(255,92,92,.3);
      color: #ffaaaa;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
      align-self: center;
    }
    .alert-retry-btn:hover { background: rgba(255,92,92,.25); }

    /* ── Empty State ───────────────────────────────────────────── */
    #empty-state {
      display: none;           /* shown via JS */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 5rem 0;
      color: var(--muted);
      text-align: center;
    }

    #empty-state.empty-state--visible { display: flex; }

    .empty-icon {
      font-size: 2.5rem;
      opacity: .35;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      opacity: .5;
    }

    .empty-sub { font-size: 0.82rem; }

    /* ── Posts Grid ────────────────────────────────────────────── */
    #posts-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ── Post Card ─────────────────────────────────────────────── */
    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      animation: card-in .3s ease both;
    }

    .post-card:hover {
      border-color: rgba(61,139,255,.4);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-index {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      opacity: .7;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.4;
      /* capitalize first letter only (CSS) */
      text-transform: capitalize;
    }

    .card-body {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* stagger animation delay for cards */
    .post-card:nth-child(1)  { animation-delay: .03s; }
    .post-card:nth-child(2)  { animation-delay: .06s; }
    .post-card:nth-child(3)  { animation-delay: .09s; }
    .post-card:nth-child(4)  { animation-delay: .12s; }
    .post-card:nth-child(5)  { animation-delay: .15s; }
    .post-card:nth-child(6)  { animation-delay: .18s; }
    .post-card:nth-child(n+7){ animation-delay: .21s; }

    /* ── Highlight matched search text ─────────────────────────── */
    mark {
      background: rgba(240,192,64,.25);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 2px;
    }

    /* ── Responsive tweaks ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .top-nav { flex-wrap: wrap; height: auto; padding: 0.75rem 1rem; gap: 0.6rem; }
      .nav-divider { display: none; }
      .ctrl-select, .ctrl-input { min-width: 0; width: 100%; }
      .nav-spacer { display: none; }
      .btn-reload { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════════
       NAVBAR
  ═══════════════════════════════════════════════ -->
  <nav class="top-nav">

    <!-- Logo -->
    <div class="nav-logo">Post<span>Board</span></div>

    <div class="nav-divider"></div>

    <!-- User Dropdown -->
    <select id="user-select" class="ctrl-select" aria-label="Select a user">
      <option value="" disabled selected>Loading users…</option>
    </select>

    <!-- Search Input -->
    <input
      id="search-input"
      type="search"
      class="ctrl-input"
      placeholder="Search posts by title…"
      aria-label="Search posts"
    />

    <div class="nav-spacer"></div>

    <!-- Reload Button -->
    <button id="reload-btn" class="btn-reload" aria-label="Reload posts">
      <!-- inline SVG reload icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.13 4.36A9 9 0 0018.49 15"/>
      </svg>
      Reload
    </button>

  </nav>


  <!-- ═══════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Section Header -->
    <div class="section-header">
      <div class="section-label">Dashboard</div>
      <h1 id="section-title">Select a user to load posts</h1>
      <p  id="post-count"></p>
    </div>

    <!-- ── Error Alert ─────────────────────────────────────── -->
    <div id="alert-box" role="alert" aria-live="assertive">
      <span class="alert-icon">⚠️</span>
      <div class="alert-body">
        <div class="alert-title">Something went wrong</div>
        <div class="alert-message" id="alert-message">An unexpected error occurred.</div>
      </div>
      <button class="alert-retry-btn" id="retry-btn">Retry</button>
    </div>

    <!-- ── Loading Spinner ─────────────────────────────────── -->
    <div id="loading-state" aria-live="polite" aria-label="Loading posts">
      <div class="spinner-ring"></div>
      <span>Fetching posts…</span>
    </div>

    <!-- ── Empty State ─────────────────────────────────────── -->
    <div id="empty-state">
      <div class="empty-icon">🗂️</div>
      <div class="empty-title">No posts found</div>
      <div class="empty-sub">Try a different search term or select another user.</div>
    </div>

    <!-- ── Posts Grid ──────────────────────────────────────── -->
    <div id="posts-container" aria-live="polite"></div>

  </main>


  <!-- Bootstrap JS (for future Bootstrap components if needed) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ES6 Module Entry Point -->
  <script type="module" src="app/main.js"></script>

</body>
</html>
